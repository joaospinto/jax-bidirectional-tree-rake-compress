name: Build distributions

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: dist/*

  test-wheel:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install and import wheel
        shell: bash
        run: |
          python -m pip install --upgrade dist/*.whl
          python -c "import jax_bidirectional_tree_rake_compress as jtrc; print(jtrc.__version__)"

  publish:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [build, test-wheel]
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/jax-bidirectional-tree-rake-compress
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python -m pip install --no-deps --force-reinstall dist/*.whl
          python -c "import importlib.metadata, os; actual = importlib.metadata.version('jax-bidirectional-tree-rake-compress'); expected = os.environ['RELEASE_TAG'].removeprefix('v'); assert actual == expected, f'release tag {expected!r} does not match package version {actual!r}'"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
